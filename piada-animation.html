<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - Pixel Restaurant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'VT323', monospace;
    }
    @font-face {
      font-family: 'VT323';
      src: url('https://fonts.gstatic.com/s/vt323/v17/pxiKyp0ihIEF2isQFjxG.woff2') format('woff2');
    }
    .container {
      width: 100%;
      max-width: 900px;
      aspect-ratio: 16/10;
      background: #2d2d44;
      position: relative;
      overflow: hidden;
      image-rendering: pixelated;
      border: 4px solid #4a4a6a;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    
    /* Title */
    .title {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd93d;
      font-size: 28px;
      text-shadow: 2px 2px 0 #000;
      z-index: 100;
    }
    
    /* Progress bar */
    .progress {
      position: absolute;
      top: 42px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 100;
    }
    .pbox {
      width: 20px;
      height: 20px;
      background: #222;
      border: 2px solid #444;
    }
    .pbox.active { background: #ffd93d; border-color: #ffaa00; }
    .pbox.done { background: #4ade80; border-color: #22c55e; }
    
    /* Sky/wall background */
    .bg {
      position: absolute;
      top: 60px;
      left: 0;
      right: 0;
      height: 100px;
      background: linear-gradient(180deg, #3d3d5c 0%, #4a4a6a 100%);
    }
    .bg::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #5a5a7a;
    }
    
    /* Floor tiles */
    .floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 60%;
      background-image: 
        linear-gradient(30deg, #252538 12%, transparent 12.5%, transparent 87%, #252538 87.5%, #252538),
        linear-gradient(150deg, #252538 12%, transparent 12.5%, transparent 87%, #252538 87.5%, #252538),
        linear-gradient(30deg, #252538 12%, transparent 12.5%, transparent 87%, #252538 87.5%, #252538),
        linear-gradient(150deg, #252538 12%, transparent 12.5%, transparent 87%, #252538 87.5%, #252538),
        linear-gradient(60deg, #2d2d44 25%, transparent 25.5%, transparent 75%, #2d2d44 75%, #2d2d44),
        linear-gradient(60deg, #2d2d44 25%, transparent 25.5%, transparent 75%, #2d2d44 75%, #2d2d44);
      background-size: 40px 70px;
      background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
    }
    
    /* Counter (glass) */
    .counter {
      position: absolute;
      top: 160px;
      left: 5%;
      right: 5%;
      height: 12px;
      background: #5a7a9a;
      border-radius: 2px;
    }
    .counter-glass {
      position: absolute;
      top: 172px;
      left: 5%;
      right: 5%;
      height: 60px;
      background: linear-gradient(180deg, rgba(150,200,255,0.1) 0%, rgba(150,200,255,0.2) 100%);
      border: 3px solid rgba(150,200,255,0.3);
      border-top: none;
    }
    
    /* Food display */
    .food-shelf {
      position: absolute;
      top: 180px;
      display: flex;
      gap: 20px;
    }
    .food-item {
      width: 50px;
      height: 50px;
      background: #8b4513;
      border: 3px solid #6b3410;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .food-item .icon { font-size: 24px; }
    .food-item .label { font-size: 10px; color: #aaa; margin-top: 2px; }
    
    /* Kitchen area */
    .kitchen {
      position: absolute;
      bottom: 20px;
      left: 5%;
      right: 5%;
      display: flex;
      justify-content: space-around;
    }
    
    /* Stove */
    .stove {
      width: 60px;
      height: 50px;
      position: relative;
    }
    .stove-top {
      width: 60px;
      height: 35px;
      background: #444;
      border: 2px solid #333;
    }
    .pot {
      position: absolute;
      top: -20px;
      left: 10px;
      width: 40px;
      height: 25px;
      background: #666;
      border-radius: 0 0 8px 8px;
    }
    .pot-rim {
      position: absolute;
      top: -5px;
      left: -2px;
      width: 44px;
      height: 8px;
      background: #777;
      border-radius: 3px;
    }
    .fire {
      position: absolute;
      bottom: -15px;
      left: 15px;
      width: 30px;
      height: 15px;
    }
    .fire::before, .fire::after {
      content: '';
      position: absolute;
      bottom: 0;
      background: linear-gradient(0deg, #ff6b35, #ffd93d);
      border-radius: 50% 50% 20% 20%;
      animation: fire 0.2s infinite alternate;
    }
    .fire::before { left: 5px; width: 10px; height: 15px; }
    .fire::after { left: 15px; width: 8px; height: 12px; animation-delay: 0.1s; }
    @keyframes fire {
      0% { transform: scaleY(1); }
      100% { transform: scaleY(1.2); }
    }
    .steam {
      position: absolute;
      top: -35px;
      left: 15px;
      font-size: 14px;
      animation: steam 1s infinite;
    }
    @keyframes steam {
      0% { transform: translateY(0); opacity: 0.8; }
      100% { transform: translateY(-15px); opacity: 0; }
    }
    .stove-base {
      width: 60px;
      height: 12px;
      background: #333;
    }
    
    /* Pixel characters */
    .character {
      position: absolute;
      width: 32px;
      height: 40px;
    }
    
    /* Chef pixel art */
    .chef {
      bottom: 60px;
    }
    .chef .head {
      position: absolute;
      top: 0;
      left: 6px;
      width: 20px;
      height: 16px;
      background: #deb887;
    }
    .chef .hat {
      position: absolute;
      top: -10px;
      left: 4px;
      width: 24px;
      height: 14px;
      background: #fff;
    }
    .chef .hat::after {
      content: '';
      position: absolute;
      top: -6px;
      left: 4px;
      width: 16px;
      height: 8px;
      background: #fff;
    }
    .chef .body {
      position: absolute;
      top: 14px;
      left: 2px;
      width: 28px;
      height: 20px;
      background: #fff;
    }
    .chef .arm {
      position: absolute;
      top: 16px;
      width: 8px;
      height: 16px;
      background: #deb887;
    }
    .chef:nth-of-type(1) .arm { left: -4px; animation: stir 0.3s infinite alternate; }
    .chef:nth-of-type(2) .arm { right: -4px; animation: stir 0.3s infinite alternate 0.15s; }
    .chef:nth-of-type(3) .arm { left: -4px; animation: stir 0.3s infinite alternate 0.1s; }
    @keyframes stir {
      0% { transform: rotate(-10deg); }
      100% { transform: rotate(10deg); }
    }
    
    /* Waiter */
    .waiter {
      bottom: 200px;
      transition: left 0.8s ease-in-out;
    }
    .waiter .head {
      position: absolute;
      top: 2px;
      left: 8px;
      width: 16px;
      height: 14px;
      background: #deb887;
    }
    .waiter .hair {
      position: absolute;
      top: 0;
      left: 6px;
      width: 20px;
      height: 8px;
      background: #4a3728;
      border-radius: 4px 4px 0 0;
    }
    .waiter .body {
      position: absolute;
      top: 14px;
      left: 4px;
      width: 24px;
      height: 20px;
      background: #2d2d44;
    }
    .waiter .apron {
      position: absolute;
      top: 20px;
      left: 6px;
      width: 20px;
      height: 12px;
      background: #8b4513;
    }
    .waiter .tray {
      position: absolute;
      top: -8px;
      left: 4px;
      width: 24px;
      height: 6px;
      background: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
    }
    
    /* Customer */
    .customer {
      bottom: 300px;
      transition: left 0.8s ease-in-out;
    }
    .customer .head {
      position: absolute;
      top: 2px;
      left: 8px;
      width: 16px;
      height: 14px;
      background: #f5deb3;
    }
    .customer .hair {
      position: absolute;
      top: 0;
      left: 6px;
      width: 20px;
      height: 8px;
      background: #4a3728;
      border-radius: 4px 4px 0 0;
    }
    .customer .body {
      position: absolute;
      top: 14px;
      left: 4px;
      width: 24px;
      height: 22px;
      background: #4169e1;
    }
    .customer .legs {
      position: absolute;
      bottom: 0;
      left: 6px;
      width: 20px;
      height: 6px;
      display: flex;
      justify-content: space-between;
    }
    .customer .legs span {
      width: 8px;
      height: 8px;
      background: #333;
    }
    
    /* Speech bubble */
    .bubble {
      position: absolute;
      top: -30px;
      left: -30px;
      background: #fff;
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .bubble::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top-color: #fff;
    }
    .bubble.show { opacity: 1; }
    
    /* Cashier */
    .cashier {
      bottom: 300px;
      right: 8%;
    }
    .cashier .head {
      position: absolute;
      top: 2px;
      left: 8px;
      width: 16px;
      height: 14px;
      background: #ffd700;
    }
    .cashier .body {
      position: absolute;
      top: 14px;
      left: 4px;
      width: 24px;
      height: 22px;
      background: #228b22;
    }
    
    /* Register */
    .register {
      position: absolute;
      bottom: 270px;
      right: 7%;
      width: 45px;
      height: 40px;
      background: #333;
      border: 2px solid #222;
    }
    .register-screen {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 37px;
      height: 18px;
      background: #0f380f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: #4ade80;
    }
    .register-btns {
      position: absolute;
      bottom: 4px;
      left: 6px;
      display: flex;
      gap: 4px;
    }
    .register-btns span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    /* Zone labels */
    .zone {
      position: absolute;
      bottom: 260px;
      font-size: 12px;
      color: #666;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🍝 PIADA KITCHEN</div>
    
    <div class="progress">
      <div class="pbox" id="b1"></div>
      <div class="pbox" id="b2"></div>
      <div class="pbox" id="b3"></div>
      <div class="pbox" id="b4"></div>
    </div>
    
    <div class="bg"></div>
    <div class="floor"></div>
    
    <!-- Counter -->
    <div class="counter"></div>
    <div class="counter-glass"></div>
    
    <!-- Food shelves -->
    <div class="food-shelf" style="left: 8%;">
      <div class="food-item">
        <span class="icon">🍝</span>
        <span class="label">PASTA</span>
      </div>
    </div>
    <div class="food-shelf" style="left: 30%;">
      <div class="food-item">
        <span class="icon">🍗</span>
        <span class="label">CHICKEN</span>
      </div>
    </div>
    <div class="food-shelf" style="left: 52%;">
      <div class="food-item">
        <span class="icon">🥬</span>
        <span class="label">VEGGIE</span>
      </div>
    </div>
    
    <!-- Kitchen -->
    <div class="kitchen">
      <div class="stove">
        <div class="pot"><div class="pot-rim"></div></div>
        <div class="fire"></div>
        <div class="stove-top"></div>
        <div class="stove-base"></div>
      </div>
      <div class="stove">
        <span class="steam">♨</span>
        <div class="pot" style="background:#555;"><div class="pot-rim"></div></div>
        <div class="fire"></div>
        <div class="stove-top"></div>
        <div class="stove-base"></div>
      </div>
      <div class="stove">
        <span class="steam">♨</span>
        <div class="pot" style="background:#5a4a4a;"><div class="pot-rim"></div></div>
        <div class="fire"></div>
        <div class="stove-top"></div>
        <div class="stove-base"></div>
      </div>
    </div>
    
    <!-- Chefs -->
    <div class="character chef" style="left: 12%;">
      <div class="hat"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="arm"></div>
    </div>
    <div class="character chef" style="left: 32%;">
      <div class="hat"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="arm"></div>
    </div>
    <div class="character chef" style="left: 52%;">
      <div class="hat"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="arm"></div>
    </div>
    
    <!-- Waiter -->
    <div class="character waiter" id="waiter">
      <div class="tray" id="tray"></div>
      <div class="hair"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="apron"></div>
    </div>
    
    <!-- Customer -->
    <div class="character customer" id="customer">
      <div class="bubble" id="bubble"></div>
      <div class="hair"></div>
      <div class="head"></div>
      <div class="body"></div>
      <div class="legs">
        <span></span><span></span>
      </div>
    </div>
    
    <!-- Cashier -->
    <div class="character cashier" style="right: 8%;">
      <div class="head"></div>
      <div class="body"></div>
    </div>
    
    <!-- Register -->
    <div class="register">
      <div class="register-screen" id="screen">$0</div>
      <div class="register-btns">
        <span style="background:#f00;"></span>
        <span style="background:#0f0;"></span>
        <span style="background:#00f;"></span>
      </div>
    </div>
    
    <!-- Zone labels -->
    <div class="zone" style="left: 10%;">PASTA</div>
    <div class="zone" style="left: 32%;">CHICKEN</div>
    <div class="zone" style="left: 54%;">VEGGIE</div>
    <div class="zone" style="right: 10%;">CASH</div>
  </div>

  <script>
    const config = {
      positions: { start: 50, pasta: 120, chicken: 250, veggie: 380, cashier: 620 },
      foods: ['🍝', '🍗', '🥬'],
      labels: ['Pasta!', 'Chicken!', 'Veggies!']
    };
    
    let state = { step: 0, customerX: 50, waiterX: 180, tray: '', bubble: '' };
    
    const customer = document.getElementById('customer');
    const waiter = document.getElementById('waiter');
    const bubble = document.getElementById('bubble');
    const tray = document.getElementById('tray');
    const screen = document.getElementById('screen');
    
    function updateDots() {
      for (let i = 1; i <= 4; i++) {
        const b = document.getElementById('b' + i);
        b.className = 'pbox';
        if (i < state.step) b.classList.add('done');
        if (i === state.step) b.classList.add('active');
      }
    }
    
    function move(el, x) {
      return new Promise(r => { el.style.left = x + 'px'; setTimeout(r, 800); });
    }
    
    async function run() {
      state = { step: 0, customerX: 50, waiterX: 180, tray: '', bubble: '' };
      customer.style.left = state.customerX + 'px';
      waiter.style.left = state.waiterX + 'px';
      updateDots();
      
      await new Promise(r => setTimeout(r, 1000));
      
      // Step 1
      state.step = 1; updateDots();
      await move(customer, config.positions.pasta);
      bubble.textContent = config.labels[0]; bubble.classList.add('show');
      state.tray = config.foods[0]; tray.textContent = state.tray;
      await move(waiter, config.positions.pasta - 20);
      await new Promise(r => setTimeout(r, 500));
      
      // Step 2
      state.step = 2; bubble.classList.remove('show');
      await move(customer, config.positions.chicken);
      bubble.textContent = config.labels[1]; bubble.classList.add('show');
      state.tray += config.foods[1]; tray.textContent = state.tray;
      await move(waiter, config.positions.chicken - 20);
      await new Promise(r => setTimeout(r, 500));
      
      // Step 3
      state.step = 3; bubble.classList.remove('show');
      await move(customer, config.positions.veggie);
      bubble.textContent = config.labels[2]; bubble.classList.add('show');
      state.tray += config.foods[2]; tray.textContent = state.tray;
      await move(waiter, config.positions.veggie - 20);
      await new Promise(r => setTimeout(r, 500));
      
      // Step 4
      state.step = 4; bubble.classList.remove('show');
      await move(customer, config.positions.cashier);
      await move(waiter, config.positions.cashier - 40);
      
      screen.textContent = '$25';
      await new Promise(r => setTimeout(r, 600));
      screen.textContent = 'OK!';
      bubble.textContent = 'Thanks!'; bubble.classList.add('show');
      await new Promise(r => setTimeout(r, 800));
      
      customer.style.opacity = '0';
      bubble.classList.remove('show');
      await new Promise(r => setTimeout(r, 500));
      
      customer.style.opacity = '1';
      screen.textContent = '$0';
      
      await new Promise(r => setTimeout(r, 500));
      run();
    }
    
    run();
  </script>
</body>
</html>
