<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen</title>
  <style>
    body { background: #1a1a2e; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    canvas { image-rendering: pixelated; border: 4px solid #4a4a6a; }
  </style>
</head>
<body>
  <canvas id="game" width="800" height="500"></canvas>
  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    // Colors
    const C = {
      wall: '#3d3d5c', floor1: '#2d2d44', floor2: '#252538',
      glass: '#5a7a9a', wood: '#8b4513', pot: '#4a4a5a',
      fire: '#ff6b35', chefWhite: '#ffffff', chefSkin: '#deb887',
      waiterBlack: '#2d2d44', waiterApron: '#8b4513',
      customerBlue: '#4169e1', customerSkin: '#f5deb3',
      cashierGold: '#ffd700', cashierGreen: '#228b22'
    };
    
    const POS = { start: 80, pasta: 150, chicken: 260, veggie: 370, cashier: 620 };
    let state = { step: 0, customerX: 80, waiterX: 200, tray: '', screen: '$0' };
    const foods = ['🍝', '🍗', '🥬'], labels = ['Pasta!', 'Chicken!', 'Veggies!'];
    
    function rect(x, y, w, h, c) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
    function text(t, x, y, s, c) { ctx.fillStyle = c; ctx.font = s + ' monospace'; ctx.fillText(t, x, y); }
    
    function drawFloor() {
      for (let y = 150; y < 500; y += 20) {
        for (let x = 0; x < 800; x += 20) {
          rect(x, y, 19, 19, ((x + y) % 40 < 20) ? C.floor1 : C.floor2);
        }
      }
    }
    
    function drawChef(x, y) {
      rect(x + 6, y - 30, 20, 10, C.chefWhite); // hat
      rect(x + 4, y - 22, 24, 8, C.chefWhite);
      rect(x + 8, y - 14, 16, 14, C.chefSkin); // head
      rect(x + 6, y - 2, 20, 20, C.chefWhite); // body
      rect(x - 4, y, 8, 16, C.chefSkin); // arm
      rect(x + 28, y, 8, 16, C.chefSkin);
    }
    
    function drawWaiter(x, y, tray) {
      rect(x + 4, y - 28, 16, 8, '#4a3728'); // hair
      rect(x + 6, y - 22, 16, 12, C.chefSkin); // head
      rect(x + 4, y - 12, 20, 18, C.waiterBlack); // body
      rect(x + 6, y, 16, 10, C.waiterApron); // apron
      rect(x - 2, y - 8, 6, 12, C.chefSkin); // arms
      rect(x + 24, y - 8, 6, 12, C.chefSkin);
      if (tray) text(tray, x + 10, y - 35, '14', '#fff');
    }
    
    function drawCustomer(x, y, bubble) {
      rect(x + 4, y - 28, 16, 8, '#4a3728'); // hair
      rect(x + 6, y - 22, 16, 12, C.customerSkin); // head
      rect(x + 4, y - 12, 20, 20, C.customerBlue); // body
      rect(x + 6, y + 6, 7, 8, '#333'); // legs
      rect(x + 15, y + 6, 7, 8, '#333');
      if (bubble) {
        rect(x - 30, y - 55, 60, 22, '#fff');
        text(bubble, x - 20, y - 40, '12', '#000');
      }
    }
    
    function drawCashier(x, y) {
      rect(x + 6, y - 22, 16, 12, C.cashierGold);
      rect(x + 4, y - 10, 20, 22, C.cashierGreen);
    }
    
    function drawScene() {
      // Clear
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, 800, 500);
      
      // Wall
      rect(0, 50, 800, 100, C.wall);
      
      // Floor
      drawFloor();
      
      // Counter
      rect(50, 180, 700, 12, C.glass);
      ctx.fillStyle = 'rgba(150,200,255,0.15)';
      ctx.fillRect(53, 192, 694, 45);
      
      // Food shelves
      [[120, '🍝', 'PASTA'], [230, '🍗', 'CHICKEN'], [340, '🥬', 'VEGGIE']].forEach(([x, icon, label]) => {
        rect(x, 190, 50, 45, C.wood);
        text(icon, x + 18, 218, '22', '#fff');
        text(label, x + 5, 248, '10', '#888');
      });
      
      // Kitchen stoves
      [120, 230, 340].forEach(x => {
        rect(x, 350, 50, 25, '#333');
        rect(x + 5, 325, 40, 20, C.pot);
        // Fire
        ctx.fillStyle = C.fire;
        ctx.beginPath();
        ctx.moveTo(x + 15, 380);
        ctx.lineTo(x + 25, 365);
        ctx.lineTo(x + 35, 380);
        ctx.fill();
      });
      
      // Chefs
      drawChef(130, 360);
      drawChef(240, 360);
      drawChef(350, 360);
      
      // Waiter
      drawWaiter(state.waiterX, 200, state.tray);
      
      // Customer
      drawCustomer(state.customerX, 160, state.step > 0 && state.step < 4 ? labels[state.step - 1] : '');
      
      // Cashier
      drawCashier(680, 160);
      
      // Register
      rect(660, 185, 45, 35, '#333');
      text(state.screen, 665, 198, '12', '#4ade80');
      
      // Progress dots
      for (let i = 0; i < 4; i++) {
        const x = 360 + i * 30;
        rect(x, 25, 14, 14, state.step > i ? '#4ade80' : (state.step === i + 1 ? '#ffd93d' : '#333'));
        rect(x - 1, 24, 16, 16, 'none');
        ctx.strokeStyle = state.step > i ? '#22c55e' : (state.step === i + 1 ? '#ffaa00' : '#555');
        ctx.lineWidth = 2;
        ctx.strokeRect(x - 1, 24, 16, 16);
      }
      
      // Title
      text('🍝 PIADA KITCHEN', 300, 20, '22', '#ffd93d');
      
      requestAnimationFrame(drawScene);
    }
    
    async function run() {
      state = { step: 0, customerX: 80, waiterX: 200, tray: '', screen: '$0' };
      await delay(1000);
      
      // Step 1
      state.step = 1;
      await move('customerX', POS.pasta, 800);
      await move('waiterX', POS.pasta - 20, 500);
      state.tray = foods[0];
      await delay(500);
      
      // Step 2
      state.step = 2;
      await move('customerX', POS.chicken, 800);
      await move('waiterX', POS.chicken - 20, 500);
      state.tray += foods[1];
      await delay(500);
      
      // Step 3
      state.step = 3;
      await move('customerX', POS.veggie, 800);
      await move('waiterX', POS.veggie - 20, 500);
      state.tray += foods[2];
      await delay(500);
      
      // Step 4
      state.step = 4;
      await move('customerX', POS.cashier, 800);
      await move('waiterX', POS.cashier - 40, 500);
      state.screen = '$25';
      await delay(600);
      state.screen = 'PAID!';
      await delay(800);
      
      // Reset
      state.step = 0;
      state.tray = '';
      state.screen = '$0';
      state.customerX = POS.start;
      state.waiterX = 200;
      
      await delay(500);
      run();
    }
    
    function move(prop, target, duration) {
      return new Promise(r => {
        const start = state[prop];
        const startT = Date.now();
        function tick() {
          const p = Math.min((Date.now() - startT) / duration, 1);
          state[prop] = start + (target - start) * p;
          if (p < 1) requestAnimationFrame(tick);
          else r();
        }
        tick();
      });
    }
    
    function delay(ms) { return new Promise(r => setTimeout(r, ms)); }
    
    drawScene();
    run();
  </script>
</body>
</html>
