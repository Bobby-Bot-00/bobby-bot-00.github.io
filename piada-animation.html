<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - Pixel Restaurant</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    * { margin: 0; padding: 0; }
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-family: 'VT323', monospace;
    }
    .game-wrapper {
      position: relative;
      padding: 20px;
    }
    canvas { 
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border: 4px solid #64477d;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(100, 71, 125, 0.4);
    }
    .title {
      position: absolute;
      top: -45px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd700;
      font-size: 32px;
      text-shadow: 3px 3px 0 #000;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <div class="title">🍝 PIADA KITCHEN</div>
    <canvas id="game" width="800" height="480"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    
    // Color palette - warm pixel art colors
    const PAL = {
      bgDark: '#151522',
      bg: '#1a1a2e',
      wall: '#2a2a45',
      wallLight: '#3a3a5a',
      floor1: '#252538',
      floor2: '#1e1e2d',
      counter: '#5a7a9a',
      counterLight: '#7a9aba',
      wood: '#8b5a2b',
      woodDark: '#5c3d1e',
      pot: '#4a4a5a',
      fire: '#ff6b35',
      fireInner: '#ffd700',
      chefWhite: '#f5f5f5',
      chefSkin: '#e8b796',
      chefHat: '#ffffff',
      waiter: '#3d3d5c',
      waiterApron: '#a0522d',
      customer: '#4169e1',
      customerDark: '#2850a0',
      cashier: '#2d8a2d',
      gold: '#ffd700',
      screen: '#0a2810',
      screenGreen: '#4ade80'
    };
    
    // State
    let state = {
      customerX: 60,
      waiterX: 180,
      step: 0,
      tray: [],
      screen: '$0',
      frame: 0
    };
    
    const POS = {
      start: 60,
      pasta: 140,
      chicken: 280,
      veggie: 420,
      cashier: 660,
      waiterY: 240,
      chefY: 340,
      customerY: 180
    };
    
    // Helper
    function rect(x, y, w, h, c) {
      ctx.fillStyle = c;
      ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    }
    
    function text(t, x, y, s, c, align) {
      ctx.fillStyle = c;
      ctx.font = s + 'px VT323';
      if (align) ctx.textAlign = align;
      ctx.fillText(t, Math.floor(x), Math.floor(y));
      if (align) ctx.textAlign = 'left';
    }
    
    // Draw isometric floor
    function drawFloor() {
      const size = 24;
      for (let y = 140; y < 480; y += size) {
        for (let x = 0; x < 800; x += size) {
          const c = ((x / size + y / size) % 2 === 0) ? PAL.floor1 : PAL.floor2;
          rect(x, y, size, size, c);
        }
      }
    }
    
    // Draw wall
    function drawWall() {
      rect(0, 40, 800, 100, PAL.wall);
      // Wall pattern
      for (let x = 40; x < 780; x += 60) {
        rect(x, 50, 2, 80, PAL.wallLight);
      }
    }
    
    // Draw counter with glass
    function drawCounter() {
      // Counter top
      rect(40, 145, 720, 12, PAL.counter);
      rect(44, 147, 712, 8, PAL.counterLight);
      
      // Glass
      ctx.fillStyle = 'rgba(150, 200, 255, 0.12)';
      ctx.fillRect(44, 157, 712, 50);
      // Glass shine
      rect(50, 160, 100, 3, 'rgba(255,255,255,0.1)');
    }
    
    // Draw food stations
    function drawStations() {
      const stations = [
        { x: 120, icon: '🍝', label: 'PASTA' },
        { x: 260, icon: '🍗', label: 'CHICKEN' },
        { x: 400, icon: '🥬', label: 'VEGGIES' }
      ];
      
      stations.forEach(s => {
        // Shelf
        rect(s.x - 25, 165, 50, 35, PAL.wood);
        rect(s.x - 23, 167, 46, 31, '#a06830');
        // Food
        text(s.icon, s.x - 8, 185, 24, '#fff');
        // Label
        text(s.label, s.x - 22, 212, 10, '#999');
      });
    }
    
    // Draw kitchen
    function drawKitchen() {
      const stoves = [130, 270, 410];
      
      stoves.forEach((x, i) => {
        // Stove base
        rect(x - 25, 365, 50, 20, '#222');
        
        // Pot
        rect(x - 15, 340, 30, 25, PAL.pot);
        rect(x - 18, 338, 36, 6, '#5a5a6a');
        
        // Fire (animated)
        const flicker = Math.sin(state.frame * 0.3 + i) * 2;
        rect(x - 8, 388, 6, 12 + flicker, PAL.fire);
        rect(x + 2, 390, 5, 10 + flicker, PAL.fireInner);
        
        // Steam
        if (Math.floor(state.frame / 15) % 2 === 0) {
          text('♨', x - 6, 328, 14, 'rgba(255,255,255,0.4)');
        }
      });
    }
    
    // Draw chef (pixel style)
    function drawChef(x, y) {
      // Shadow
      rect(x - 12, y + 30, 24, 4, 'rgba(0,0,0,0.3)');
      
      // Body
      rect(x - 10, y + 5, 20, 22, PAL.chefWhite);
      rect(x - 8, y + 8, 16, 16, '#eee');
      
      // Head
      rect(x - 8, y - 12, 16, 14, PAL.chefSkin);
      
      // Hat
      rect(x - 10, y - 22, 20, 10, PAL.chefHat);
      rect(x - 6, y - 28, 12, 8, PAL.chefHat);
      
      // Arms (animated)
      const armSwing = Math.sin(state.frame * 0.15) * 3;
      rect(x - 14, y + 8 + armSwing, 5, 14, PAL.chefSkin);
      rect(x + 9, y + 8 - armSwing, 5, 14, PAL.chefSkin);
    }
    
    // Draw waiter
    function drawWaiter(x, y, tray) {
      // Shadow
      rect(x - 10, y + 28, 20, 4, 'rgba(0,0,0,0.3)');
      
      // Body
      rect(x - 8, y + 6, 16, 18, PAL.waiter);
      rect(x - 6, y + 9, 12, 12, '#2a2a40');
      
      // Apron
      rect(x - 6, y + 14, 12, 8, PAL.waiterApron);
      
      // Head
      rect(x - 6, y - 8, 12, 12, PAL.chefSkin);
      
      // Hair
      rect(x - 8, y - 12, 16, 6, '#3d2817');
      
      // Arms
      rect(x - 12, y + 8, 4, 10, PAL.chefSkin);
      rect(x + 8, y + 8, 4, 10, PAL.chefSkin);
      
      // Tray
      rect(x - 12, y - 16, 24, 4, '#666');
      if (tray.length > 0) {
        text(tray.join(''), x - 8, y - 4, 12, '#fff');
      }
    }
    
    // Draw customer with bubble
    function drawCustomer(x, y, label) {
      // Shadow
      rect(x - 10, y + 32, 20, 4, 'rgba(0,0,0,0.3)');
      
      // Body
      rect(x - 10, y + 8, 20, 22, PAL.customer);
      rect(x - 8, y + 11, 16, 16, PAL.customerDark);
      
      // Head
      rect(x - 8, y - 6, 16, 14, PAL.chefSkin);
      
      // Hair
      rect(x - 10, y - 10, 20, 6, '#3d2817');
      
      // Legs (walking animation)
      const legOffset = Math.sin(state.frame * 0.2) * 2;
      rect(x - 6, y + 28, 5, 6 + legOffset, '#222');
      rect(x + 1, y + 28, 5, 6 - legOffset, '#222');
      
      // Bubble
      if (label) {
        const bw = 70, bh = 24;
        rect(x - bw/2 - 4, y - 45, bw, bh, '#fff');
        rect(x - 4, y - 25, 8, 8, '#fff');
        // Bubble content
        text(label, x - bw/2, y - 28, 14, '#000');
      }
    }
    
    // Draw cashier
    function drawCashier(x, y) {
      // Body
      rect(x - 10, y + 8, 20, 22, PAL.cashier);
      rect(x - 8, y + 11, 16, 16, '#1e6a1e');
      
      // Head
      rect(x - 8, y - 6, 16, 14, PAL.gold);
    }
    
    // Draw register
    function drawRegister(x, y) {
      rect(x - 20, y, 40, 30, '#222');
      rect(x - 18, y + 3, 36, 14, PAL.screen);
      text(state.screen, x - 14, y + 12, 12, PAL.screenGreen);
      // Buttons
      [[x - 14, y + 20], [x - 6, y + 20], [x + 2, y + 20]].forEach(([bx, by], i) => {
        rect(bx, by, 6, 6, i === 0 ? '#f44' : i === 1 ? '#4f4' : '#44f');
      });
    }
    
    // Progress indicators
    function drawProgress() {
      const dots = [
        { x: 200, label: 'PASTA' },
        { x: 340, label: 'CHICKEN' },
        { x: 480, label: 'VEGGIE' },
        { x: 660, label: 'CASH' }
      ];
      
      dots.forEach((d, i) => {
        const active = state.step === i + 1;
        const done = state.step > i + 1;
        const c = done ? '#22c55e' : active ? '#ffd93d' : '#333';
        const s = done ? '#166534' : active ? '#a16207' : '#444';
        rect(d.x - 6, 18, 12, 12, c);
        rect(d.x - 7, 17, 14, 14, 'none');
        ctx.strokeStyle = s;
        ctx.lineWidth = 2;
        ctx.strokeRect(d.x - 7, 17, 14, 14);
        text(d.label, d.x - 20, 45, 10, '#666');
      });
    }
    
    // Main draw
    function draw() {
      // Clear
      rect(0, 0, 800, 480, PAL.bg);
      
      drawWall();
      drawFloor();
      drawCounter();
      drawStations();
      drawKitchen();
      
      // Characters
      drawChef(145, POS.chefY);
      drawChef(285, POS.chefY);
      drawChef(425, POS.chefY);
      
      drawWaiter(state.waiterX, POS.waiterY, state.tray);
      drawCustomer(state.customerX, POS.customerY, state.step > 0 && state.step < 4 ? ['Pasta!', 'Chicken!', 'Veggies!'][state.step - 1] : '');
      
      drawCashier(700, POS.customerY);
      drawRegister(680, POS.customerY + 25);
      
      drawProgress();
      
      state.frame++;
      requestAnimationFrame(draw);
    }
    
    // Animation logic
    async function run() {
      const labels = ['Pasta!', 'Chicken!', 'Veggies!'];
      const foods = ['🍝', '🍗', '🥬'];
      
      while (true) {
        // Reset
        state.step = 0;
        state.customerX = POS.start;
        state.waiterX = 180;
        state.tray = [];
        state.screen = '$0';
        
        await sleep(1000);
        
        // Step 1: Pasta
        state.step = 1;
        await move('customerX', POS.pasta, 800);
        await move('waiterX', POS.pasta - 20, 500);
        state.tray = [foods[0]];
        await sleep(500);
        
        // Step 2: Chicken
        state.step = 2;
        await move('customerX', POS.chicken, 800);
        await move('waiterX', POS.chicken - 20, 500);
        state.tray = [foods[0], foods[1]];
        await sleep(500);
        
        // Step 3: Veggies
        state.step = 3;
        await move('customerX', POS.veggie, 800);
        await move('waiterX', POS.veggie - 20, 500);
        state.tray = [foods[0], foods[1], foods[2]];
        await sleep(500);
        
        // Step 4: Cashier
        state.step = 4;
        await move('customerX', POS.cashier, 800);
        await move('waiterX', POS.cashier - 40, 500);
        
        state.screen = '$25';
        await sleep(600);
        state.screen = 'PAID!';
        
        // Customer leaves
        await move('customerX', POS.cashier + 50, 300);
        await sleep(500);
        
        state.screen = '$0';
        await sleep(500);
      }
    }
    
    function move(prop, target, dur) {
      return new Promise(r => {
        const start = state[prop], startT = Date.now();
        function t() {
          const p = Math.min((Date.now() - startT) / dur, 1);
          state[prop] = start + (target - start) * (p < 0.5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2);
          if (p < 1) requestAnimationFrame(t); else r();
        }
        t();
      });
    }
    
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
    
    // Start
    draw();
    run();
  </script>
</body>
</html>
