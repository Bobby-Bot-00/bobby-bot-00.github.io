<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - Pixel Animation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
    }
    .game-container {
      width: 100%;
      max-width: 800px;
      aspect-ratio: 16/10;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
      position: relative;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(99,102,241,0.3);
    }
    
    /* Title */
    .title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd93d;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,217,61,0.5);
      z-index: 100;
      letter-spacing: 4px;
    }
    
    /* Progress dots */
    .progress {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 100;
    }
    .dot {
      width: 16px;
      height: 16px;
      background: #2d2d44;
      border: 3px solid #4a4a6a;
      border-radius: 50%;
      transition: all 0.3s;
    }
    .dot.active {
      background: #ffd93d;
      border-color: #ffaa00;
      box-shadow: 0 0 15px #ffd93d;
    }
    .dot.done {
      background: #4ade80;
      border-color: #22c55e;
    }
    
    /* Scene layers */
    .wall {
      position: absolute;
      top: 90px;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(180deg, #2a2a40 0%, #3d3d5c 100%);
    }
    .wall::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: #4a4a6a;
    }
    
    .floor {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      background: 
        repeating-linear-gradient(90deg, #2d2d44 0px, #2d2d44 30px, #252538 30px, #252538 60px),
        repeating-linear-gradient(0deg, transparent 0px, transparent 28px, rgba(255,255,255,0.02) 28px, rgba(255,255,255,0.02) 30px);
    }
    
    /* Glass counter */
    .glass {
      position: absolute;
      top: 200px;
      left: 5%;
      right: 5%;
      height: 80px;
      background: linear-gradient(180deg, rgba(150,200,255,0.1) 0%, rgba(150,200,255,0.2) 100%);
      border: 4px solid rgba(150,200,255,0.3);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }
    .glass::before {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    }
    
    /* Food stations */
    .station {
      position: absolute;
      top: 215px;
      width: 80px;
      height: 60px;
      background: linear-gradient(180deg, #8b4513 0%, #6b3410 100%);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 0 #4a2508;
    }
    .station-icon {
      font-size: 28px;
      filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.3));
    }
    .station-label {
      font-size: 10px;
      color: #ccc;
      margin-top: 4px;
      letter-spacing: 1px;
    }
    .station:nth-of-type(1) { left: 8%; }
    .station:nth-of-type(2) { left: 28%; }
    .station:nth-of-type(3) { left: 48%; }
    
    /* Kitchen pots */
    .pot-area {
      position: absolute;
      bottom: 80px;
      left: 5%;
      right: 5%;
      height: 100px;
      display: flex;
      justify-content: space-around;
    }
    .pot {
      position: relative;
      width: 70px;
    }
    .pot-body {
      width: 70px;
      height: 50px;
      background: linear-gradient(180deg, #5a5a6a 0%, #3a3a4a 100%);
      border-radius: 0 0 15px 15px;
      position: relative;
    }
    .pot-rim {
      position: absolute;
      top: -12px;
      left: -5px;
      width: 80px;
      height: 15px;
      background: linear-gradient(180deg, #6a6a7a 0%, #5a5a6a 100%);
      border-radius: 8px;
    }
    .pot-handle {
      position: absolute;
      right: -15px;
      top: 5px;
      width: 20px;
      height: 10px;
      background: #444;
      border-radius: 4px;
    }
    .stove {
      position: absolute;
      bottom: -18px;
      left: 5px;
      width: 60px;
      height: 15px;
      background: #222;
      border-radius: 4px;
    }
    .flame {
      position: absolute;
      bottom: -35px;
      left: 15px;
      width: 35px;
      height: 20px;
      background: linear-gradient(0deg, #ff6b35, #ffd93d 50%, transparent);
      border-radius: 50% 50% 30% 30%;
      animation: flameFlicker 0.2s infinite alternate;
    }
    .flame:nth-child(2) { animation-delay: 0.1s; }
    @keyframes flameFlicker {
      0% { transform: scaleY(1) scaleX(1); opacity: 0.9; }
      100% { transform: scaleY(1.2) scaleX(0.9); opacity: 1; }
    }
    .bubble {
      position: absolute;
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: bubbleRise 1s infinite;
    }
    .bubble:nth-child(3) { left: 20px; animation-delay: 0s; }
    .bubble:nth-child(4) { left: 40px; animation-delay: 0.3s; }
    @keyframes bubbleRise {
      0% { bottom: 5px; opacity: 0; }
      50% { opacity: 1; }
      100% { bottom: 25px; opacity: 0; }
    }
    .steam {
      position: absolute;
      top: -20px;
      left: 20px;
      font-size: 16px;
      animation: steam 1.5s infinite;
    }
    @keyframes steam {
      0% { transform: translateY(0) scale(1); opacity: 0.8; }
      100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
    }
    
    /* Chef */
    .chef {
      position: absolute;
      bottom: 70px;
      width: 45px;
      height: 65px;
    }
    .chef-hat {
      position: absolute;
      top: -15px;
      left: 5px;
      width: 35px;
      height: 20px;
      background: #fff;
      border-radius: 5px 5px 0 0;
    }
    .chef-hat::before {
      content: '';
      position: absolute;
      top: -8px;
      left: 5px;
      width: 25px;
      height: 12px;
      background: #fff;
      border-radius: 4px;
    }
    .chef-head {
      position: absolute;
      top: 0;
      left: 10px;
      width: 25px;
      height: 22px;
      background: #deb887;
      border-radius: 50%;
    }
    .chef-eyes {
      position: absolute;
      top: 8px;
      left: 18px;
      width: 4px;
      height: 4px;
      background: #000;
      border-radius: 50%;
      box-shadow: 10px 0 0 #000;
    }
    .chef-body {
      position: absolute;
      top: 20px;
      left: 5px;
      width: 35px;
      height: 35px;
      background: linear-gradient(180deg, #fff 0%, #eee 100%);
      border-radius: 8px;
    }
    .chef-arm {
      position: absolute;
      top: 25px;
      width: 12px;
      height: 25px;
      background: #deb887;
      border-radius: 6px;
    }
    .chef:nth-child(1) .chef-arm { left: -8px; animation: stirLeft 0.4s infinite alternate; }
    .chef:nth-child(2) .chef-arm { right: -8px; animation: stirRight 0.4s infinite alternate; }
    .chef:nth-child(3) .chef-arm { left: -8px; animation: stirLeft 0.4s infinite alternate 0.2s; }
    @keyframes stirLeft {
      0% { transform: rotate(-15deg); }
      100% { transform: rotate(15deg); }
    }
    @keyframes stirRight {
      0% { transform: rotate(15deg); }
      100% { transform: rotate(-15deg); }
    }
    .chef:nth-of-type(1) { left: 12%; }
    .chef:nth-of-type(2) { left: 32%; }
    .chef:nth-of-type(3) { left: 52%; }
    
    /* Waiter */
    .waiter {
      position: absolute;
      bottom: 200px;
      left: 200px;
      width: 40px;
      height: 55px;
      transition: left 0.8s ease-in-out;
    }
    .waiter-hair {
      position: absolute;
      top: 0;
      left: 8px;
      width: 24px;
      height: 12px;
      background: #4a3728;
      border-radius: 12px 12px 0 0;
    }
    .waiter-head {
      position: absolute;
      top: 8px;
      left: 10px;
      width: 20px;
      height: 18px;
      background: #deb887;
      border-radius: 50%;
    }
    .waiter-eyes {
      position: absolute;
      top: 14px;
      left: 15px;
      width: 3px;
      height: 3px;
      background: #000;
      border-radius: 50%;
      box-shadow: 7px 0 0 #000;
    }
    .waiter-body {
      position: absolute;
      top: 24px;
      left: 5px;
      width: 30px;
      height: 25px;
      background: #1a1a2e;
      border-radius: 6px;
    }
    .waiter-apron {
      position: absolute;
      top: 32px;
      left: 8px;
      width: 24px;
      height: 15px;
      background: #8b4513;
      border-radius: 3px;
    }
    .waiter-tray {
      position: absolute;
      top: -15px;
      left: 5px;
      width: 30px;
      height: 10px;
      background: #666;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      transition: all 0.3s;
    }
    
    /* Customer */
    .customer {
      position: absolute;
      bottom: 280px;
      left: 50px;
      width: 40px;
      height: 60px;
      transition: left 0.8s ease-in-out;
    }
    .customer-hair {
      position: absolute;
      top: 0;
      left: 8px;
      width: 24px;
      height: 14px;
      background: #4a3728;
      border-radius: 12px 12px 0 0;
    }
    .customer-head {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 20px;
      height: 18px;
      background: #f5deb3;
      border-radius: 50%;
    }
    .customer-eyes {
      position: absolute;
      top: 16px;
      left: 15px;
      width: 3px;
      height: 3px;
      background: #000;
      border-radius: 50%;
      box-shadow: 7px 0 0 #000;
    }
    .customer-body {
      position: absolute;
      top: 26px;
      left: 5px;
      width: 30px;
      height: 30px;
      background: linear-gradient(180deg, #4169e1 0%, #2850a0 100%);
      border-radius: 8px;
    }
    .customer-bubble {
      position: absolute;
      top: -35px;
      left: -20px;
      background: #fff;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 12px;
      font-weight: bold;
      color: #000;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.2);
    }
    .customer-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-top-color: #fff;
    }
    .customer-bubble.show { opacity: 1; }
    
    /* Cashier */
    .cashier {
      position: absolute;
      bottom: 280px;
      right: 8%;
      width: 40px;
      height: 55px;
    }
    .cashier-head {
      position: absolute;
      top: 8px;
      left: 10px;
      width: 20px;
      height: 18px;
      background: #ffd700;
      border-radius: 50%;
    }
    .cashier-body {
      position: absolute;
      top: 24px;
      left: 5px;
      width: 30px;
      height: 28px;
      background: #228b22;
      border-radius: 6px;
    }
    
    /* Register */
    .register {
      position: absolute;
      bottom: 255px;
      right: 7%;
      width: 55px;
      height: 40px;
      background: #333;
      border-radius: 6px;
    }
    .register-screen {
      position: absolute;
      top: 5px;
      left: 5px;
      width: 45px;
      height: 18px;
      background: #0f380f;
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: #0f0;
      font-family: monospace;
    }
    .register-buttons {
      position: absolute;
      bottom: 4px;
      left: 8px;
      display: flex;
      gap: 4px;
    }
    .register-btn {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    /* Instructions */
    .instructions {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: #666;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="title">🍝 PIADA KITCHEN 🍝</div>
    
    <div class="progress">
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
      <div class="dot" id="dot3"></div>
      <div class="dot" id="dot4"></div>
    </div>
    
    <div class="wall"></div>
    <div class="floor"></div>
    <div class="glass"></div>
    
    <!-- Food Stations -->
    <div class="station">
      <span class="station-icon">🍝</span>
      <span class="station-label">PASTA</span>
    </div>
    <div class="station">
      <span class="station-icon">🍗</span>
      <span class="station-label">CHICKEN</span>
    </div>
    <div class="station">
      <span class="station-icon">🥬</span>
      <span class="station-label">VEGGIES</span>
    </div>
    
    <!-- Kitchen Pots -->
    <div class="pot-area">
      <div class="pot">
        <div class="pot-rim"></div>
        <div class="pot-body"></div>
        <div class="pot-handle"></div>
        <div class="stove"></div>
        <div class="flame"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
      </div>
      <div class="pot">
        <span class="steam">♨️</span>
        <div class="pot-rim"></div>
        <div class="pot-body" style="background: linear-gradient(180deg, #4a4a5a 0%, #3a3a4a 100%);"></div>
        <div class="pot-handle"></div>
        <div class="stove"></div>
        <div class="flame"></div>
      </div>
      <div class="pot">
        <span class="steam">♨️</span>
        <div class="pot-rim"></div>
        <div class="pot-body" style="background: linear-gradient(180deg, #5a4a4a 0%, #4a3a3a 100%);"></div>
        <div class="pot-handle"></div>
        <div class="stove"></div>
        <div class="flame"></div>
      </div>
    </div>
    
    <!-- Chefs -->
    <div class="chef">
      <div class="chef-hat"></div>
      <div class="chef-head"></div>
      <div class="chef-eyes"></div>
      <div class="chef-body"></div>
      <div class="chef-arm"></div>
    </div>
    <div class="chef">
      <div class="chef-hat"></div>
      <div class="chef-head"></div>
      <div class="chef-eyes"></div>
      <div class="chef-body"></div>
      <div class="chef-arm"></div>
    </div>
    <div class="chef">
      <div class="chef-hat"></div>
      <div class="chef-head"></div>
      <div class="chef-eyes"></div>
      <div class="chef-body"></div>
      <div class="chef-arm"></div>
    </div>
    
    <!-- Waiter -->
    <div class="waiter" id="waiter">
      <div class="waiter-tray" id="tray"></div>
      <div class="waiter-hair"></div>
      <div class="waiter-head"></div>
      <div class="waiter-eyes"></div>
      <div class="waiter-body"></div>
      <div class="waiter-apron"></div>
    </div>
    
    <!-- Customer -->
    <div class="customer" id="customer">
      <div class="customer-bubble" id="bubble"></div>
      <div class="customer-hair"></div>
      <div class="customer-head"></div>
      <div class="customer-eyes"></div>
      <div class="customer-body"></div>
    </div>
    
    <!-- Cashier -->
    <div class="cashier">
      <div class="cashier-head"></div>
      <div class="cashier-body"></div>
    </div>
    
    <!-- Register -->
    <div class="register">
      <div class="register-screen" id="register">$0</div>
      <div class="register-buttons">
        <div class="register-btn" style="background:#f00;"></div>
        <div class="register-btn" style="background:#0f0;"></div>
        <div class="register-btn" style="background:#00f;"></div>
      </div>
    </div>
    
    <div class="instructions">Animation loops automatically</div>
  </div>

  <script>
    // Animation Configuration
    const config = {
      positions: {
        start: 50,
        pasta: 120,
        chicken: 240,
        veggie: 360,
        cashier: 550
      },
      foods: ['🍝', '🍗', '🥬'],
      labels: ['Pasta!', 'Chicken!', 'Veggies!'],
      delays: {
        pause: 500,
        move: 800,
        bubble: 400
      }
    };
    
    // State
    let state = {
      step: 0,
      customerX: config.positions.start,
      waiterX: 200,
      tray: [],
      bubble: '',
      register: '$0'
    };
    
    // Elements
    const customer = document.getElementById('customer');
    const waiter = document.getElementById('waiter');
    const bubble = document.getElementById('bubble');
    const tray = document.getElementById('tray');
    const register = document.getElementById('register');
    const dots = [
      document.getElementById('dot1'),
      document.getElementById('dot2'),
      document.getElementById('dot3'),
      document.getElementById('dot4')
    ];
    
    // Update dots
    function updateDots() {
      dots.forEach((dot, i) => {
        dot.classList.remove('active', 'done');
        if (i < state.step) dot.classList.add('done');
        if (i === state.step) dot.classList.add('active');
      });
    }
    
    // Move element
    function moveTo(element, x) {
      return new Promise(resolve => {
        element.style.left = x + 'px';
        setTimeout(resolve, config.delays.move);
      });
    }
    
    // Show bubble
    function showBubble(text) {
      bubble.textContent = text;
      bubble.classList.add('show');
    }
    
    function hideBubble() {
      bubble.classList.remove('show');
    }
    
    // Update tray
    function updateTray() {
      tray.textContent = state.tray.join('');
    }
    
    // Animation sequence
    async function runSequence() {
      // Reset
      state = {
        step: 0,
        customerX: config.positions.start,
        waiterX: 200,
        tray: [],
        bubble: '',
        register: '$0'
      };
      
      customer.style.left = state.customerX + 'px';
      waiter.style.left = state.waiterX + 'px';
      updateTray();
      updateDots();
      
      await sleep(1000);
      
      // Step 1: Pasta
      state.step = 1;
      updateDots();
      await moveTo(customer, config.positions.pasta);
      showBubble(config.labels[0]);
      state.tray.push(config.foods[0]);
      updateTray();
      await moveTo(waiter, config.positions.pasta - 30);
      await sleep(config.delays.pause);
      
      // Step 2: Chicken
      state.step = 2;
      hideBubble();
      updateDots();
      await moveTo(customer, config.positions.chicken);
      showBubble(config.labels[1]);
      state.tray.push(config.foods[1]);
      updateTray();
      await moveTo(waiter, config.positions.chicken - 30);
      await sleep(config.delays.pause);
      
      // Step 3: Veggies
      state.step = 3;
      hideBubble();
      updateDots();
      await moveTo(customer, config.positions.veggie);
      showBubble(config.labels[2]);
      state.tray.push(config.foods[2]);
      updateTray();
      await moveTo(waiter, config.positions.veggie - 30);
      await sleep(config.delays.pause);
      
      // Step 4: Checkout
      state.step = 4;
      hideBubble();
      updateDots();
      await moveTo(customer, config.positions.cashier);
      await moveTo(waiter, config.positions.cashier - 50);
      
      // Payment
      register.textContent = '$25';
      await sleep(600);
      register.textContent = 'PAID!';
      showBubble('Thanks!');
      await sleep(1000);
      
      // Customer leaves
      customer.style.opacity = '0';
      hideBubble();
      await sleep(500);
      
      // Reset for loop
      customer.style.opacity = '1';
      register.textContent = '$0';
      
      await sleep(500);
      runSequence();
    }
    
    // Helper
    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    // Start
    runSequence();
  </script>
</body>
</html>
