<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; }
    body { background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; display: flex; justify-content: center; align-items: center; font-family: 'Press Start 2P', monospace; }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }
  </style>
</head>
<body>
  <canvas id="g" width="800" height="480"></canvas>
  <script>
    const chef = new Image(); chef.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAx0lEQVR4nO3YoQ0CQRCF4X9fcBc8lSDxVIEkoQJKoAISJFXgkVSCJ6dBIy+3yx1573ObbGbHzGR2ICKcldoB+75/01DXdVVzFuaEOWGuzL3mW/cEYU6YE+bKv9V87Z4gzAlzwpwwJ8wJc8JcqR3weTs3nRNW20P2ATUJc8LcovUD6/3p6/y4HKveH0uYE+aEuTI2wNT7gewERxLmhLkydLZfbnbM2et+HfR3EOaEOWFOmBPmhDlNnUBERERERERERERERAQ/8gE0ZyFFBBVszgAAAABJRU5ErkJggg==";
    const waiter = new Image(); waiter.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAA2ElEQVR4nO3YIW+CMRSF4dMTfsSCQ03gUbOIuWn0kiV4EgQSsWSehGQaPYfAouYnpuaW/YuhkaT9+Lac93FNmttW9PbeSgAAIFWpDfAyG/+qR4vdR9UZrHBWOCtc+W93vnVOsMJZ4axwpXXAn/2m0xxxcz9vumcrnBXOCjfoeoHJ0/PZ+H27bDq/lhXOCmeFK7UBHjffvfYGr/Mh/wE1rHBWuHJpbb/6etBfth69XdQ7WOGscFa40vrdvz1O1aXPu0PTusAKZ4Vz3xsAAAAAAAAAAAAAAF3BCTXZJDVYSOc5AAAAAElFTkSuQmCC";
    const customer = new Image(); customer.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAsklEQVR4nO3YwQkCMRSE4XmDRViJPQh24HVBsAJLsAJB2KsdCPZgJXaxnj0n67LM/90C4eXl8AYSCQAApKrWAtNDkxZUx7Y7WOGscFa4WtvM984EK5wVzgpXvQt+XrdZM2K7P3ft2QpnhbPCbeY+YHe6/qzf90vX/a2scFY4K1y1Fhiew6Jvg/Ew8h/Qwgpnhau1zXzvTLDCWeGscFY4K5wVzks3AAAAAAAAAAAAAAD6gy+CjRg26WoxdAAAAABJRU5ErkJggg==";
    const cashier = new Image(); cashier.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAn0lEQVR4nO3WsRFCIRCE4WULIbcMc8ugLMowtwxzGnnGL9FxgHGc/b+Y2TsC7pAAAECqsjqwXeuhjfpjLO3ZCmeFs8KV1YHHU1tnQLms7dkKZ4WzwpXdBWo9/wvGeL/Hvz0/ywpnhbPCldmAdm9b9/4n/dan7mCFs8JZ4cq/vfnVM8EKZ4WzwlnhrHBWOP+6AQAAAAAAAAAAAAAAAG32AmFLFyw3FTc/AAAAAElFTkSuQmCC";
    const pasta = new Image(); pasta.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAoUlEQVR4nO3WsRHDMAxDURCzZDQNkREyhEbLLkqvwikk2QX+a31H0gVwkgAAAAAAQJq6e+FobVx9r95vvckKZ4WzwtXugeN7nfFV9drbEVY4K5wVrk4vWO2E3ZmfWeGscH76AAB4Uq0OaO199O3/T++fpX+wwlnhrHC1e+DpTljN/MwKZ4WzwtXpBaudsDvzMyucFc5PHwAAAAAAAAAAutEPYsIYKygfqCEAAAAASUVORK5CYII=";
    const chicken = new Image(); chicken.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAApklEQVR4nO3WsRHDMAxDURAjZQ6PoSEyQobQGJ4jKzm9C6eQZBf4r/UdCRfgSQIAAAAAAGnq7oV7ex1X37f+vTWTFc4KZ4Wr2QOPvV12fFRtfWpmK5wVzgpXqxeM3oTZnT+zwlnh/HQAAHhSjQ5o7b307f9P75+hf7DCWeGscDV74OqbMNr5MyucFc4KV6sXjN6E2Z0/s8JZ4fx0AAAAAAAAAADQjX46IhgrU2TLFwAAAABJRU5ErkJggg==";
    const veggie = new Image(); veggie.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAAqElEQVR4nO3WoRHDMBBE0dWWZJSChFKBS0gFQSooyC0lXMABkmyw/1HP3K3B3kgCAAAAAABpytULt/f2Pft+PI9LM1nhrHBWuDJ7YP3U046Pao82NbMVzgpnhSurF4zehNmd71nhrHC+OwAA3KmMDqh1X/r2/6e119A/WOGscFa4Mnvg6psw2vmeFc4KZ4UrqxeM3oTZne9Z4axwvjsAAAAAAAAAAOhCP9uzGCuyFD3TAAAAAElFTkSuQmCC";

    const c = document.getElementById('g');
    const x = c.getContext('2d');
    x.imageSmoothingEnabled = false;
    
    const S = 4; // scale
    const C = { wall: '#2a2a45', floor1: '#252538', floor2: '#1e1e2d', counter: '#5a7a9a', wood: '#8b5a2b' };
    let st = { cx: 30, wx: 90, step: 0, tray: '', screen: '$0', f: 0 };
    const P = { s: 30, p: 70, ch: 140, v: 210, ca: 330, wy: 230, cy: 170, kx: 170 };
    
    function rect(y, h, c) { x.fillStyle = c; x.fillRect(0, y*2, 800, h*2); }
    function sprite(img, sx, sy, dx, dy, w=16, h=16) {
      x.drawImage(img, sx*S, sy*S, w*S, h*S, dx*S, dy*S, w*S, h*S);
    }
    function txt(t, dx, dy, s=12, c='#fff') {
      x.fillStyle = c; x.font = s + 'px "Press Start 2P"'; x.fillText(t, dx*2, dy*2);
    }
    
    function draw() {
      x.fillStyle = '#1a1a2e'; x.fillRect(0, 0, 800, 480);
      
      // Wall
      rect(20, 50, C.wall);
      for(let i=20; i<780; i+=30) { rect(25, 40, '#3d3d5c'); }
      
      // Floor
      for(let y=70; y<240; y+=12) {
        for(let x=0; x<400; x+=12) {
          x.fillStyle = ((x+y)/12)%2===0 ? C.floor1 : C.floor2;
          x.fillRect(x*2, y*2, 11*2, 11*2);
        }
      }
      
      // Counter
      rect(72, 6, C.counter);
      x.fillStyle = 'rgba(180,220,255,0.15)'; x.fillRect(44, 81*2, 712*2, 50*2);
      
      // Food stations
      [[60,'🍝','PASTA'],[130,'🍗','CHKN'],[200,'🥬','VEG']].forEach(([x,i,l])=>{
        rect(82, 22, C.wood); txt(i, x+4, 95, 20);
        txt(l, x-5, 110, 8, '#888');
      });
      
      // Kitchen
      [65,135,205].forEach(x=>{ rect(180, 10, '#222'); });
      
      // Characters (using emoji for simplicity)
      txt('👨‍🍳', 70, 165, 32); txt('👨‍🍳', 140, 165, 32); txt('👨‍🍳', 210, 165, 32);
      txt('🧑', st.wx/2+2, 105, 24);
      txt('🧑', st.cx/2+2, 80, 24);
      txt('👩', 350, 80, 24);
      
      // Register
      rect(335, 20, '#222');
      txt(st.screen, 340, 100, 10, '#4ade80');
      
      // Progress
      [[80,'PSTA'],[150,'CHKN'],[220,'VEG'],[330,'PAY']].forEach(([dx,l],i)=>{
        let a = st.step===i+1, d = st.step>i+1;
        txt(d?'✓':(a?'●':'○'), dx, 15, 10, d?'#4ade80':(a?'#ffd93d':'#666'));
        txt(l, dx-5, 28, 6, '#666');
      });
      
      txt('🍝 PIADA', 150, 15, 16, '#ffd93d');
      if(st.tray) txt(st.tray, st.wx/2, 95, 12);
      
      st.f++;
      requestAnimationFrame(draw);
    }
    
    async function run() {
      while(1) {
        st.step=0; st.cx=P.s; st.wx=90; st.tray=''; st.screen='$0';
        await sl(1000);
        st.step=1;
        await mv('cx', P.p, 600); await mv('wx', P.p-10, 400);
        st.tray='🍝'; await sl(400);
        st.step=2;
        await mv('cx', P.ch, 600); await mv('wx', P.ch-10, 400);
        st.tray='🍝🍗'; await sl(400);
        st.step=3;
        await mv('cx', P.v, 600); await mv('wx', P.v-10, 400);
        st.tray='🍝🍗🥬'; await sl(400);
        st.step=4;
        await mv('cx', P.ca, 600); await mv('wx', P.ca-20, 400);
        st.screen='$25'; await sl(500);
        st.screen='OK!'; await sl(800);
        await mv('cx', P.ca+30, 300);
        st.screen='$0'; await sl(500);
      }
    }
    function mv(p, t, d) { return new Promise(r=>{ let s=st[p], T=Date.now(); (function F(){ let q=Math.min((Date.now()-T)/d,1); st[p]=s+(t-s)*(1-Math.pow(1-q,3)); q<1?requestAnimationFrame(F):r(); })(); }); }
    function sl(t) { return new Promise(r=>setTimeout(r,t)); }
    
    draw(); run();
  </script></body></html>
