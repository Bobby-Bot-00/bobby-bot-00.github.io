<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - 意式快餐像素动画</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      width: 100%;
    }
    .title {
      text-align: center;
      color: #fff;
      font-size: 36px;
      margin-bottom: 10px;
      text-shadow: 0 0 30px rgba(99,102,241,0.5);
    }
    .subtitle {
      text-align: center;
      color: #a0a0b0;
      font-size: 16px;
      margin-bottom: 40px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      backdrop-filter: blur(10px);
      transition: all 0.3s;
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(99,102,241,0.3);
      border-color: rgba(99,102,241,0.5);
    }
    .card-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }
    .card-title {
      color: #fff;
      font-size: 24px;
      margin-bottom: 10px;
    }
    .card-desc {
      color: #a0a0b0;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .card-btn {
      display: inline-block;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: #fff;
      padding: 12px 30px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: all 0.3s;
    }
    .card-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 20px rgba(99,102,241,0.4);
    }
    .tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }
    .tag {
      background: rgba(99,102,241,0.2);
      color: #818cf8;
      padding: 4px 12px;
      border-radius: 15px;
      font-size: 12px;
    }
    .footer {
      text-align: center;
      color: #666;
      margin-top: 40px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">🍝 Piada Kitchen</h1>
    <p class="subtitle">意式快餐 Pixel 动画演示</p>
    
    <div class="card">
      <div class="card-icon">🎮</div>
      <h2 class="card-title">点餐流程动画</h2>
      <p class="card-desc">
        这是一个展示 Piada 意式快餐店经营模式的像素动画。<br>
        客人依次选择意面、鸡肉、蔬菜，服务员在玻璃挡板后同步取餐，
        厨师在后台持续备餐，最后到收银台结账。
      </p>
      <a href="piada-animation.html" class="card-btn" target="_blank">▶️ 查看动画</a>
      <div class="tags">
        <span class="tag">Pixel Art</span>
        <span class="tag">CSS动画</span>
        <span class="tag">意式快餐</span>
        <span class="tag">商业计划</span>
      </div>
    </div>
    
    <p class="footer">Made with ❤️ by Bobby</p>
  </div>
</body>
</html>
