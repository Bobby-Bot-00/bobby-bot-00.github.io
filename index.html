<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bobby 的小工具</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 500px;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b6b, #feca57);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 40px;
    }
    .modules {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .module {
      background: rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px 20px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .module:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.3);
    }
    .module .icon {
      font-size: 40px;
      margin-bottom: 15px;
    }
    .module .name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .module .desc {
      font-size: 12px;
      opacity: 0.7;
    }
    .module .count {
      display: inline-block;
      background: rgba(255,107,107,0.2);
      color: #ff6b6b;
      padding: 4px 12px;
      border-radius: 10px;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">🦉</div>
    <h1>Bobby 的小工具</h1>
    <p>让AI做的各种有趣小应用</p>
    
    <div class="modules">
      <a href="https://bobby-bot-00.github.io/useless-apps/" class="module">
        <div class="icon">🎯</div>
        <div class="name">无用软件100</div>
        <div class="desc">AI做的有趣小测试</div>
        <div class="count">第 1 款</div>
      </a>
      
      <a href="skill-news.html" class="module">
        <div class="icon">📡</div>
        <div class="name">Agent Skills 新闻</div>
        <div class="desc">每日AI Agent技能动态</div>
        <div class="count">NEW</div>
      </a>
    </div>
  </div>
</body>
</html>
