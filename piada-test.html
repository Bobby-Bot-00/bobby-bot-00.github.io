<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - FINE</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; }
    canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <canvas id="g" width="800" height="480"></canvas>
  <script>
    const chef = new Image(); chef.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAAAtCAYAAABRXm6KAAABB0lEQVR4nO2asQ3CMBQFbcQSocgc7ACLkAkYgQlgEdiBOVLAGKalACEk8P3Ed3UkWzm9J8c/OQWjlFJqrZVzzglmQW+gdRQAg0ewdu1EqyMTAKOAVisoQu1EqCMTAKOAlioocu1QdWQCYBQAowAYBcAoAGZJLXy/nFJUus2u2lomAEYBLQnIT6TA5Ir7NAEwCoDBqqDv+5f3Qtfj/q/rrofDx2fGcfQ6uhWsIBgFwCgARgEwTsQ+4ERs5lhBc6+gKQ7ia9aRCYBRAIwCYBQAo4A5DuXfnXyiDeK7isP3d5gAGAXM8UPsdj6WqVXBr6pytR2+eqcmAEYBrf6aGPl0VBMTAKOAxPIAP+8yoG4RmFUAAAAASUVORK5CYII=";
    const waiter = new Image(); waiter.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAAAbCAYAAACDfYo6AAAA00lEQVR4nO3ZsQ3CMBAF0AtiDldM4BGYwFXqFKmYgCpFKiagSkFN5Qkywk2QyjU7wAKJ0iD/4/ivjuRIX/flXBoBSTG8xaispal11qHWQbSOAYBVGzXrtYOqI04AGAMAO4oB9/EKOfcy3ASNEwDGAMAYABgDAGMA/3QL0peYogbehxMAxgC874JCWN//xH4WS3Q67z5Tyvf3QpwAMAbgvYLSuPzcCnpLHk6sIG9YQR4/xLZqJ5VWLMnhiX4FTgAaK8jjLejRRzc3n25S/pT3jBUkWB8b3iNZgqmPhAAAAABJRU5ErkJggg==";
    const customer = new Image(); customer.src = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAGAAAAAYCAYAAAAF6fiUAAAArklEQVR4nO2YoRGAMBAEPwwlYDBgKYGCUFRCBSgKSgloDIYeQDMDDnIh7MqY/8nOnXhnIvbRdosU15sLNSsLNQiuQYCYYFGLvXZUdUQCxCBATG4RsFajZG659KaGBIhBwJ8qqB6qy3evaaDbfc4sr+5AAsQgQAwCxCBADAJSvwV1vvvc/eeOqZ0e/y8SIAYBKVZQSrXzdh2RADEI+NMtaJs3+wJFUwSbRQLEIMC0HDGwF/0x1ZYmAAAAAElFTkSuQmCC";
    
    const c = document.getElementById('g');
    const x = c.getContext('2d');
    x.imageSmoothingEnabled = false;
    
    let st = { cx: 30, wx: 100, step: 0, screen: '$0', f: 0 };
    const P = { s: 30, p: 70, ch: 140, v: 210, ca: 330 };
    
    function rect(x, y, w, h, color) {
      x.fillStyle = color;
      x.fillRect(x, y, w, h);
    }
    
    function drawImg(img, dx, dy, w, h) {
      if (img.complete) x.drawImage(img, dx, dy, w, h);
    }
    
    function txt(t, dx, dy, s=12, c='#fff') {
      x.fillStyle = c;
      x.font = s + 'px monospace';
      x.fillText(t, dx, dy);
    }
    
    function draw() {
      rect(0, 0, 800, 480, '#1a1a2e');
      rect(0, 20, 800, 50, '#2a2a45');
      
      for (let y=70; y<240; y+=12)
        for (let x=0; x<400; x+=12)
          rect(x, y, 11, 11, ((x+y)/12)%2===0 ? '#252538' : '#1e1e2d');
      
      rect(40, 145, 720, 10, '#5a7a9a');
      rect(40, 155, 720, 40, 'rgba(180,220,255,0.1)');
      
      [[60,'PASTA'],[130,'CHICKEN'],[200,'VEG']].forEach(([sx,label])=>{
        rect(sx-15, 160, 30, 25, '#8b5a2b');
        txt(label, sx-14, 178, 14, '#aaa');
      });
      
      [65,135,205].forEach(sx=>{
        rect(sx-15, 340, 30, 15, '#222');
        if (Math.floor(st.f/15)%2===0) {
          rect(sx-3, 358, 4, 6, '#ff6b35');
          rect(sx+1, 359, 3, 5, '#ffd700');
        }
      });
      
      drawImg(chef, 80*4, 150*4, 32*4, 15*4);
      drawImg(chef, 150*4, 150*4, 32*4, 15*4);
      drawImg(chef, 220*4, 150*4, 32*4, 15*4);
      
      drawImg(waiter, st.wx*4, 120*4, 32*4, 9*4);
      drawImg(customer, st.cx*4, 80*4, 32*4, 8*4);
      drawImg(waiter, 360*4, 80*4, 32*4, 9*4);
      
      rect(345, 105, 40, 30, '#222');
      txt(st.screen, 350, 118, 10, '#4ade80');
      
      [[80,'PSTA'],[150,'CHKN'],[220,'VEG'],[330,'PAY']].forEach(([dx,label],i)=>{
        const active = st.step===i+1, done = st.step>i+1;
        txt(done?'OK':(active?'*':'-'), dx, 35, 10, done?'#4ade80':(active?'#ffd93d':'#666'));
        txt(label, dx-8, 50, 7, '#666');
      });
      
      if (st.step>0 && st.step<4) {
        rect(st.cx*4+10, 40, 50, 18, '#fff');
        txt(['PASTA','CHICKEN','VEG'][st.step-1], st.cx*4+15, 53, 8, '#000');
      }
      
      txt('[ PIADA FINE ]', 280, 25, 14, '#ffd93d');
      st.f++;
      requestAnimationFrame(draw);
    }
    
    async function run() {
      while (true) {
        st.step=0; st.cx=P.s; st.wx=100; st.screen='$0';
        await sl(1000);
        
        st.step=1;
        await mv('cx', P.p, 600); await mv('wx', P.p-10, 400);
        await sl(400);
        
        st.step=2;
        await mv('cx', P.ch, 600); await mv('wx', P.ch-10, 400);
        await sl(400);
        
        st.step=3;
        await mv('cx', P.v, 600); await mv('wx', P.v-10, 400);
        await sl(400);
        
        st.step=4;
        await mv('cx', P.ca, 600); await mv('wx', P.ca-20, 400);
        st.screen='$25'; await sl(500);
        st.screen='OK!'; await sl(800);
        
        await mv('cx', P.ca+30, 300);
        st.screen='$0'; await sl(500);
      }
    }
    
    function mv(prop, target, dur) {
      return new Promise(r=>{
        const start=st[prop], T=Date.now();
        (function F(){
          const p=Math.min((Date.now()-T)/dur,1);
          st[prop]=start+(target-start)*(1-Math.pow(1-p,3));
          p<1?requestAnimationFrame(F):r();
        })();
      });
    }
    function sl(t) { return new Promise(r=>setTimeout(r,t)); }
    
    draw(); run();
  <\/script>
</body>
</html>
