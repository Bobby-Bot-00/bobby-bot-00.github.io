<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - TEST</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #1a1a2e; overflow: hidden; }
    body { display: flex; justify-content: center; align-items: center; }
    canvas { image-rendering: pixelated; max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <canvas id="g" width="800" height="480"></canvas>
  <script>
    const chefImg = new Image(); chefImg.src = "iVBORw0KGgoAAAANSUhEUgAAAEAAAABQCAYAAACpv3NFAAAAyElEQVR4nO3X0RFBMRCF4ZMztwcqUQOVGCpQggoYlVCDSqginnkwY5KLO+f/nrOb5CHZXQkAAKQqY29Qa60985VSup7ZCmeFs8KVf3/zY/8JVjgrnBWuTO3N9/4TrHBWOCvc0Dvh/XLUN82Wm6Z4K5wVzgo39K67t/PhqS9YrPdv46+nnVrWMws0ssJZ4UprAmaBibPCWeHKpwGvdb53b9579pivtm/vaIWzwlnhrHBWOCucf30AAAAAAAAAAAAAAAAAAAAAjeQB918jfIkDF0kAAAAASUVORK5CYII=";
    const waiterImg = new Image(); waiterImg.src = "iVBORw0KGgoAAAANSUhEUgAAAEAAAABQCAYAAACpv3NFAAAA6UlEQVR4nO3YMWpCQRSF4TMHF5HKKiuwcA92r0ptEUjICgTBQhCyghDBwjqVXfZg4QpSWWUXWtsIMpOXhPN/9dzDTDGXuSMBAIBUpXVgNxqe1KPd4Vh1BiucFc4KV/7bnW/dE6xwVjgr3KB14Ptqpj49z1+r6q1wVjgrXGkd+P35dvEuGD9dv6P79WXPuHX93eSFWaCGFc4KV2oDuuXX35oFFvfMArewwlnhrHBWOCucFW7QOrA7PqhPu+FHVb0VzgpnhSutA7ePo15ng+nmwH9ADSucf3sDAAAAAAAAAAAAAAAAAAAA+iFnU7cgQD7TYckAAAAASUVORK5CYII=";
    const customerImg = new Image(); customerImg.src = "iVBORw0KGgoAAAANSUhEUgAAAEAAAABQCAYAAACpv3NFAAAA1klEQVR4nO3azQkCMRDF8ZeHPXhbsAmxIEHYCizBCgTBPmxBbELYk1ahZz0IknVXff/fOTNMDvmYEAkAAKQqfSe8bXXTgEpbNwcrnBXOCld+bc33vSdY4axwVrhJ3wmvs62GND23VfFWOCucFW7S97l7OTzeC+arzcv4026tmvH0ApWscFa4UptgeVx+VS+wX+zpBd5hhbPCWeGscFY4K5wVzgpnhfPYBQDAX/0PaJrm5ftA13VlzHzPrHBWOCucFc4KZ4Xz2AUAAAAAAAAAAAAAAADow+6fER6/OGt6RAAAAABJRU5ErkJggg==";
    
    const c = document.getElementById('g');
    const x = c.getContext('2d');
    x.imageSmoothingEnabled = false;
    
    const S = 4;
    let st = { cx: 30, wx: 100, step: 0, tray: '', screen: '$0', f: 0 };
    const P = { s: 30, p: 70, ch: 140, v: 210, ca: 330 };
    
    function rect(x, y, w, h, color) {
      x.fillStyle = color;
      x.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
    }
    
    function drawImg(img, dx, dy) {
      if (img.complete) x.drawImage(img, dx*S, dy*S, 16*S, 20*S);
    }
    
    function txt(t, x, y, size=12, color='#fff') {
      x.fillStyle = color;
      x.font = size + 'px monospace';
      x.fillText(t, x, y);
    }
    
    function draw() {
      rect(0, 0, 800, 480, '#1a1a2e');
      rect(0, 20, 800, 50, '#2a2a45');
      
      for (let y=70; y<240; y+=12)
        for (let x=0; x<400; x+=12)
          rect(x, y, 11, 11, ((x+y)/12)%2===0 ? '#252538' : '#1e1e2d');
      
      rect(40, 145, 720, 10, '#5a7a9a');
      rect(40, 155, 720, 40, 'rgba(180,220,255,0.1)');
      
      [[60,'PASTA'],[130,'CHICKEN'],[200,'VEG']].forEach(([sx,label])=>{
        rect(sx-15, 160, 30, 25, '#8b5a2b');
        txt(label, sx-12, 175, 14, '#aaa');
      });
      
      [65,135,205].forEach(sx=>{
        rect(sx-15, 340, 30, 15, '#222');
        if (Math.floor(st.f/15)%2===0) {
          rect(sx-3, 358, 4, 6, '#ff6b35');
          rect(sx+1, 359, 3, 5, '#ffd700');
        }
      });
      
      drawImg(chefImg, 80, 150);
      drawImg(chefImg, 150, 150);
      drawImg(chefImg, 220, 150);
      drawImg(waiterImg, st.wx, 100);
      drawImg(customerImg, st.cx, 60);
      drawImg(waiterImg, 360, 60);
      
      rect(345, 105, 40, 30, '#222');
      txt(st.screen, 350, 118, 10, '#4ade80');
      
      [[80,'PSTA'],[150,'CHKN'],[220,'VEG'],[330,'PAY']].forEach(([dx,label],i)=>{
        const active = st.step===i+1, done = st.step>i+1;
        txt(done?'OK':(active?'*':'-'), dx, 35, 10, done?'#4ade80':(active?'#ffd93d':'#666'));
        txt(label, dx-8, 50, 7, '#666');
      });
      
      if (st.step>0 && st.step<4) {
        rect(st.cx+10, 40, 50, 18, '#fff');
        txt(['PASTA','CHICKEN','VEG'][st.step-1], st.cx+15, 53, 8, '#000');
      }
      
      txt('[ PIADA TEST ]', 300, 25, 14, '#ffd93d');
      st.f++;
      requestAnimationFrame(draw);
    }
    
    async function run() {
      while (true) {
        st.step=0; st.cx=P.s; st.wx=100; st.tray=''; st.screen='$0';
        await sl(1000);
        st.step=1;
        await mv('cx', P.p, 600); await mv('wx', P.p-10, 400);
        await sl(400);
        st.step=2;
        await mv('cx', P.ch, 600); await mv('wx', P.ch-10, 400);
        await sl(400);
        st.step=3;
        await mv('cx', P.v, 600); await mv('wx', P.v-10, 400);
        await sl(400);
        st.step=4;
        await mv('cx', P.ca, 600); await mv('wx', P.ca-20, 400);
        st.screen='$25'; await sl(500);
        st.screen='OK!'; await sl(800);
        await mv('cx', P.ca+30, 300);
        st.screen='$0'; await sl(500);
      }
    }
    
    function mv(prop, target, dur) {
      return new Promise(r=>{
        const start=st[prop], T=Date.now();
        (function F(){
          const p=Math.min((Date.now()-T)/dur,1);
          st[prop]=start+(target-start)*(1-Math.pow(1-p,3));
          p<1?requestAnimationFrame(F):r();
        })();
      });
    }
    function sl(t) { return new Promise(r=>setTimeout(r,t)); }
    
    draw(); run();
  <\/script>
</body>
</html>
