<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piada Kitchen - FINE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin: 0; padding: 0; }
    body { 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); 
      min-height: 100vh; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      font-family: 'Press Start 2P', monospace;
    }
    canvas { 
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    // 4x scale for finer pixels
    const SCALE = 4;
    const W = 400, H = 240;
    canvas.width = W * SCALE;
    canvas.height = H * SCALE;
    canvas.style.width = W * 2 + 'px';
    canvas.style.height = H * 2 + 'px';
    ctx.imageSmoothingEnabled = false;
    
    const C = {
      bg: '#1a1a2e', wall: '#2a2a45', wallLine: '#3d3d5c',
      floor1: '#252538', floor2: '#1e1e2d',
      counter: '#5a7a9a', wood: '#8b5a2b',
      chefWhite: '#f5f5f5', chefSkin: '#e8b796',
      waiter: '#4a4a6a', waiterDark: '#3a3a5a', apron: '#a0522d',
      customer: '#6b8fe8', customerHair: '#ff9500',
      cashier: '#4ab84a', gold: '#ffd700',
      screenGreen: '#4ade80', black: '#222'
    };
    
    let state = { customerX: 30, waiterX: 90, step: 0, tray: '', screen: '$0', frame: 0 };
    const POS = { start: 30, pasta: 70, chicken: 140, veggie: 210, cashier: 330, waiterY: 120, chefY: 170, customerY: 90 };
    
    function rect(x, y, w, h, c) {
      ctx.fillStyle = c;
      ctx.fillRect(x * SCALE, y * SCALE, w * SCALE, h * SCALE);
    }
    
    function text(t, x, y, s, c) {
      ctx.fillStyle = c;
      ctx.font = (s * SCALE) + 'px "Press Start 2P"';
      ctx.fillText(t, x * SCALE, y * SCALE);
    }
    
    // 精致的像素角色 - 32x32风格
    function drawChef(cx, cy) {
      const s = SCALE;
      // 阴影
      rect(cx-12, cy+20, 24, 4, 'rgba(0,0,0,0.3)');
      // 帽子多层
      rect(cx-8, cy-32, 16, 6, C.chefWhite);
      rect(cx-12, cy-26, 24, 6, C.chefWhite);
      rect(cx-14, cy-20, 28, 8, C.chefWhite);
      rect(cx-14, cy-12, 28, 4, '#e8e8e8');
      // 脸
      rect(cx-10, cy-8, 20, 14, C.chefSkin);
      rect(cx-10, cy+6, 20, 4, '#d4a070');
      // 眼睛
      rect(cx-6, cy-2, 4, 4, C.black);
      rect(cx+2, cy-2, 4, 4, C.black);
      rect(cx-5, cy-1, 1, 1, '#fff');
      rect(cx+3, cy-1, 1, 1, '#fff');
      // 身体
      rect(cx-12, cy+10, 24, 14, C.chefWhite);
      rect(cx-14, cy+12, 4, 12, C.chefSkin);
      rect(cx+10, cy+12, 4, 12, C.chefSkin);
    }
    
    function drawWaiter(cx, cy, hasTray) {
      const s = SCALE;
      rect(cx-12, cy+20, 24, 4, 'rgba(0,0,0,0.3)');
      // 头发
      rect(cx-10, cy-18, 20, 6, '#4a3728');
      rect(cx-12, cy-12, 24, 6, '#3d2817');
      // 脸
      rect(cx-10, cy-6, 20, 14, C.chefSkin);
      rect(cx-10, cy+8, 20, 2, '#d4a070');
      rect(cx-6, cy+2, 4, 4, C.black);
      rect(cx+2, cy+2, 4, 4, C.black);
      // 身体
      rect(cx-12, cy+12, 24, 12, C.waiter);
      rect(cx-10, cy+14, 20, 8, C.waiterDark);
      // 围裙
      rect(cx-8, cy+20, 16, 8, C.apron);
      if (hasTray) rect(cx-6, cy-4, 12, 4, '#666');
    }
    
    function drawCustomer(cx, cy) {
      const s = SCALE;
      rect(cx-12, cy+20, 24, 4, 'rgba(0,0,0,0.3)');
      // 橙色头发
      rect(cx-10, cy-18, 20, 6, C.customerHair);
      rect(cx-12, cy-12, 24, 6, '#e88400');
      rect(cx-8, cy-6, 16, 2, '#d07800');
      // 脸
      rect(cx-10, cy-4, 20, 14, C.chefSkin);
      rect(cx-10, cy+10, 20, 2, '#d4a070');
      rect(cx-6, cy+4, 4, 4, C.black);
      rect(cx+2, cy+4, 4, 4, C.black);
      // 身体绿色
      rect(cx-12, cy+14, 24, 14, C.customer);
      rect(cx-10, cy+16, 20, 10, '#4a6fc8');
      // 腿
      rect(cx-8, cy+26, 6, 6, C.black);
      rect(cx+2, cy+26, 6, 6, C.black);
    }
    
    function drawCashier(cx, cy) {
      const s = SCALE;
      rect(cx-12, cy+20, 24, 4, 'rgba(0,0,0,0.3)');
      rect(cx-8, cy-16, 16, 4, '#5a4030');
      rect(cx-10, cy-12, 20, 2, '#4a3020');
      rect(cx-10, cy-10, 20, 14, C.gold);
      rect(cx-10, cy+4, 20, 2, '#d0b000');
      rect(cx-6, cy-4, 4, 4, C.black);
      rect(cx+2, cy-4, 4, 4, C.black);
      rect(cx-12, cy+6, 24, 14, C.cashier);
      rect(cx-10, cy+8, 20, 10, '#3a983a');
    }
    
    function drawBubble(cx, cy, txt) {
      rect(cx-25, cy-30, 50, 18, '#fff');
      rect(cx-4, cy-14, 8, 8, '#fff');
      ctx.fillStyle = '#000';
      ctx.font = (8 * SCALE) + 'px "Press Start 2P"';
      ctx.fillText(txt, (cx-20) * SCALE, (cy-16) * SCALE);
    }
    
    function drawFloor() {
      for (let y = 70; y < H; y += 12) {
        for (let x = 0; x < W; x += 12) {
          rect(x, y, 11, 11, ((x + y) / 12) % 2 === 0 ? C.floor1 : C.floor2);
        }
      }
    }
    
    function drawWall() {
      rect(0, 20, W, 50, C.wall);
      for (let x = 20; x < W - 20; x += 30) rect(x, 25, 1, 40, C.wallLine);
    }
    
    function draw() {
      rect(0, 0, 800, 480, C.bg);
      drawWall();
      drawFloor();
      
      // Counter
      rect(40, 145, 720, 10, C.counter);
      rect(40, 155, 720, 40, 'rgba(180,220,255,0.15)');
      
      // Food stations
      [[60,'PASTA'],[130,'CHICKEN'],[200,'VEG']].forEach(([sx,label])=>{
        rect(sx-15, 160, 30, 25, C.wood);
        text(label, sx-12, 178, 14, '#aaa');
      });
      
      // Kitchen
      [65,135,205].forEach(sx=>{
        rect(sx-15, 340, 30, 15, '#222');
        rect(sx-8, 325, 16, 12, '#4a4a5a');
        if (Math.floor(state.frame/15)%2===0) {
          rect(sx-3, 358, 4, 6, '#ff6b35');
          rect(sx+1, 359, 3, 5, '#ffd700');
        }
      });
      
      // Characters - using new detailed functions
      drawChef(80, POS.chefY);
      drawChef(150, POS.chefY);
      drawChef(220, POS.chefY);
      
      drawWaiter(state.waiterX, POS.waiterY, state.step > 0 && state.step < 4);
      drawCustomer(state.customerX, POS.customerY);
      drawCashier(360, POS.customerY);
      
      // Register
      rect(345, 105, 40, 30, '#222');
      text(state.screen, 350, 118, 10, C.screenGreen);
      
      // Progress
      [[80,'PSTA'],[150,'CHKN'],[200,'VEG'],[330,'PAY']].forEach(([dx,label],i)=>{
        const active = state.step===i+1, done = state.step>i+1;
        text(done?'OK':(active?'*':'-'), dx, 35, 10, done?'#4ade80':(active?'#ffd93d':'#666'));
        text(label, dx-8, 50, 7, '#666');
      });
      
      // Bubble
      if (state.step>0 && state.step<4) {
        drawBubble(state.customerX+20, POS.customerY-10, ['PSTA','CHKN','VEG'][state.step-1]);
      }
      
      text('[ PIADA ]', 340, 25, 16, '#ffd93d');
      
      state.frame++;
      requestAnimationFrame(draw);
    }
    
    async function run() {
      while (true) {
        state.step=0; state.customerX=POS.start; state.waiterX=90; state.screen='$0';
        await sl(1000);
        
        state.step=1;
        await mv('customerX', POS.pasta, 600); await mv('waiterX', POS.pasta-10, 400);
        await sl(400);
        
        state.step=2;
        await mv('customerX', POS.chicken, 600); await mv('waiterX', POS.chicken-10, 400);
        await sl(400);
        
        state.step=3;
        await mv('customerX', POS.veggie, 600); await mv('waiterX', POS.veggie-10, 400);
        await sl(400);
        
        state.step=4;
        await mv('customerX', POS.cashier, 600); await mv('waiterX', POS.cashier-20, 400);
        state.screen='$25'; await sl(500);
        state.screen='OK!'; await sl(800);
        
        await mv('customerX', POS.cashier+30, 300);
        state.screen='$0'; await sl(500);
      }
    }
    
    function mv(prop, target, dur) {
      return new Promise(r=>{
        const start=state[prop], T=Date.now();
        (function F(){
          const p=Math.min((Date.now()-T)/dur,1);
          state[prop]=start+(target-start)*(1-Math.pow(1-p,3));
          p<1?requestAnimationFrame(F):r();
        })();
      });
    }
    function sl(t) { return new Promise(r=>setTimeout(r,t)); }
    
    draw(); run();
  <\/script>
</body>
</html>
